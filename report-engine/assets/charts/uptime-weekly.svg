<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" font-family="'DM Sans', sans-serif">
  <!-- Background -->
  <rect width="560" height="160" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="40" y="28" font-size="12" font-weight="700" fill="#1A1A17">Uptime — Week 12</text>
  <text x="40" y="44" font-size="9" fill="#6B6B64">Per-endpoint availability · March 17–21, 2026</text>

  <!-- Bars — 5 days each as small blocks -->
  <!-- /api/payments — 99.98% -->
  <text x="130" y="72" font-size="9" fill="#3A3A35" text-anchor="end">/api/payments</text>
  <rect x="140" y="60" width="80" height="18" fill="#1B6B4A" rx="2"/>
  <rect x="222" y="60" width="80" height="18" fill="#1B6B4A" rx="2"/>
  <rect x="304" y="60" width="80" height="18" fill="#1B6B4A" rx="2"/>
  <rect x="386" y="60" width="80" height="18" fill="#1B6B4A" rx="2"/>
  <rect x="468" y="60" width="52" height="18" fill="#1B6B4A" rx="2"/>
  <text x="530" y="73" font-size="8" font-weight="700" fill="#1B6B4A">99.98%</text>

  <!-- /api/settlements — 99.97% -->
  <text x="130" y="98" font-size="9" fill="#3A3A35" text-anchor="end">/api/settlements</text>
  <rect x="140" y="86" width="80" height="18" fill="#1B6B4A" rx="2"/>
  <rect x="222" y="86" width="80" height="18" fill="#1B6B4A" rx="2"/>
  <rect x="304" y="86" width="80" height="18" fill="#1B6B4A" rx="2"/>
  <rect x="386" y="86" width="80" height="18" fill="#1B6B4A" rx="2"/>
  <rect x="468" y="86" width="52" height="18" fill="#1B6B4A" rx="2"/>
  <text x="530" y="99" font-size="8" font-weight="700" fill="#1B6B4A">99.97%</text>

  <!-- /checkout — 99.95% (with one yellow block for planned downtime) -->
  <text x="130" y="124" font-size="9" fill="#3A3A35" text-anchor="end">/checkout</text>
  <rect x="140" y="112" width="80" height="18" fill="#1B6B4A" rx="2"/>
  <rect x="222" y="112" width="80" height="18" fill="#1B6B4A" rx="2"/>
  <rect x="304" y="112" width="60" height="18" fill="#1B6B4A" rx="2"/>
  <rect x="366" y="112" width="18" height="18" fill="#D4A017" rx="2"/>
  <rect x="386" y="112" width="80" height="18" fill="#1B6B4A" rx="2"/>
  <rect x="468" y="112" width="52" height="18" fill="#1B6B4A" rx="2"/>
  <text x="530" y="125" font-size="8" font-weight="700" fill="#1B6B4A">99.95%</text>

  <!-- Day labels -->
  <text x="180" y="146" font-size="7" fill="#6B6B64" text-anchor="middle">Mon</text>
  <text x="262" y="146" font-size="7" fill="#6B6B64" text-anchor="middle">Tue</text>
  <text x="344" y="146" font-size="7" fill="#6B6B64" text-anchor="middle">Wed</text>
  <text x="426" y="146" font-size="7" fill="#6B6B64" text-anchor="middle">Thu</text>
  <text x="494" y="146" font-size="7" fill="#6B6B64" text-anchor="middle">Fri</text>

  <!-- Legend -->
  <rect x="340" y="24" width="8" height="8" fill="#1B6B4A" rx="1"/>
  <text x="352" y="32" font-size="7" fill="#6B6B64">Available</text>
  <rect x="400" y="24" width="8" height="8" fill="#D4A017" rx="1"/>
  <text x="412" y="32" font-size="7" fill="#6B6B64">Planned downtime</text>
  <rect x="490" y="24" width="8" height="8" fill="#C0392B" rx="1"/>
  <text x="502" y="32" font-size="7" fill="#6B6B64">Incident</text>
</svg>
