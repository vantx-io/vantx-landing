<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 280" font-family="'DM Sans', sans-serif">
  <!-- Background -->
  <rect width="560" height="280" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="40" y="28" font-size="12" font-weight="700" fill="#1A1A17">p95 Latency Trend — 3 Months</text>
  <text x="40" y="44" font-size="9" fill="#6B6B64">Synthetic monitoring · critical flows (ms)</text>

  <!-- Grid -->
  <line x1="70" y1="60" x2="70" y2="230" stroke="#E2E1DC" stroke-width="1"/>
  <line x1="70" y1="230" x2="530" y2="230" stroke="#E2E1DC" stroke-width="1"/>
  <line x1="70" y1="187.5" x2="530" y2="187.5" stroke="#F0EFEB" stroke-width="1" stroke-dasharray="4"/>
  <line x1="70" y1="145" x2="530" y2="145" stroke="#F0EFEB" stroke-width="1" stroke-dasharray="4"/>
  <line x1="70" y1="102.5" x2="530" y2="102.5" stroke="#F0EFEB" stroke-width="1" stroke-dasharray="4"/>
  <line x1="70" y1="60" x2="530" y2="60" stroke="#F0EFEB" stroke-width="1" stroke-dasharray="4"/>

  <!-- Y-axis labels -->
  <text x="60" y="234" font-size="8" fill="#6B6B64" text-anchor="end">0</text>
  <text x="60" y="191" font-size="8" fill="#6B6B64" text-anchor="end">500</text>
  <text x="60" y="149" font-size="8" fill="#6B6B64" text-anchor="end">1000</text>
  <text x="60" y="106" font-size="8" fill="#6B6B64" text-anchor="end">1500</text>
  <text x="60" y="64" font-size="8" fill="#6B6B64" text-anchor="end">2000</text>

  <!-- X-axis labels -->
  <text x="147" y="248" font-size="8" fill="#6B6B64" text-anchor="middle">January</text>
  <text x="300" y="248" font-size="8" fill="#6B6B64" text-anchor="middle">February</text>
  <text x="453" y="248" font-size="8" fill="#6B6B64" text-anchor="middle">March</text>

  <!-- Threshold line -->
  <line x1="70" y1="145" x2="530" y2="145" stroke="#C0392B" stroke-width="1" stroke-dasharray="6 3" opacity="0.6"/>
  <text x="534" y="143" font-size="7" fill="#C0392B">SLA 1000ms</text>

  <!-- Login → Dashboard (green) -->
  <polyline points="147,175.6 300,177 453,178.7" fill="none" stroke="#1B6B4A" stroke-width="2.5"/>
  <circle cx="147" cy="175.6" r="3.5" fill="#1B6B4A"/>
  <circle cx="300" cy="177" r="3.5" fill="#1B6B4A"/>
  <circle cx="453" cy="178.7" r="3.5" fill="#1B6B4A"/>
  <text x="460" y="175" font-size="7" fill="#1B6B4A">Login 670ms</text>

  <!-- Create Payment (teal) -->
  <polyline points="147,180.8 300,183.8 453,186.4" fill="none" stroke="#2E8B6E" stroke-width="2.5"/>
  <circle cx="147" cy="180.8" r="3.5" fill="#2E8B6E"/>
  <circle cx="300" cy="183.8" r="3.5" fill="#2E8B6E"/>
  <circle cx="453" cy="186.4" r="3.5" fill="#2E8B6E"/>
  <text x="460" y="190" font-size="7" fill="#2E8B6E">Payment 510ms</text>

  <!-- Settlement Export (amber) -->
  <polyline points="147,94 300,102.5 453,113.8" fill="none" stroke="#D4A017" stroke-width="2.5"/>
  <circle cx="147" cy="94" r="3.5" fill="#D4A017"/>
  <circle cx="300" cy="102.5" r="3.5" fill="#D4A017"/>
  <circle cx="453" cy="113.8" r="3.5" fill="#D4A017"/>
  <text x="460" y="117" font-size="7" fill="#D4A017">Settlement 1350ms</text>

  <!-- Checkout (blue) -->
  <polyline points="147,136.5 300,143 453,148.2" fill="none" stroke="#3B82B5" stroke-width="2.5"/>
  <circle cx="147" cy="136.5" r="3.5" fill="#3B82B5"/>
  <circle cx="300" cy="143" r="3.5" fill="#3B82B5"/>
  <circle cx="453" cy="148.2" r="3.5" fill="#3B82B5"/>
  <text x="460" y="152" font-size="7" fill="#3B82B5">Checkout 960ms</text>

  <!-- Data annotations -->
  <text x="147" y="88" font-size="7" fill="#D4A017" text-anchor="middle">1600</text>
  <text x="300" y="97" font-size="7" fill="#D4A017" text-anchor="middle">1500</text>
  <text x="453" y="108" font-size="7" fill="#D4A017" text-anchor="middle">1350</text>

  <!-- Unit -->
  <text x="40" y="264" font-size="7" fill="#B0AFA8">ms · lower is better</text>
</svg>
