<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 280" font-family="'DM Sans', sans-serif">
  <!-- Background -->
  <rect width="560" height="280" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="40" y="28" font-size="12" font-weight="700" fill="#1A1A17">SRE Maturity Progress</text>
  <text x="40" y="44" font-size="9" fill="#6B6B64">Score by dimension (0–5) · January → March</text>

  <!-- Grid -->
  <line x1="200" y1="60" x2="200" y2="250" stroke="#E2E1DC" stroke-width="1"/>
  <line x1="200" y1="250" x2="530" y2="250" stroke="#E2E1DC" stroke-width="1"/>

  <!-- Scale lines (0 to 5, each = 66px) -->
  <line x1="200" y1="60" x2="200" y2="250" stroke="#F0EFEB" stroke-width="1" stroke-dasharray="4"/>
  <line x1="266" y1="60" x2="266" y2="250" stroke="#F0EFEB" stroke-width="1" stroke-dasharray="4"/>
  <line x1="332" y1="60" x2="332" y2="250" stroke="#F0EFEB" stroke-width="1" stroke-dasharray="4"/>
  <line x1="398" y1="60" x2="398" y2="250" stroke="#F0EFEB" stroke-width="1" stroke-dasharray="4"/>
  <line x1="464" y1="60" x2="464" y2="250" stroke="#F0EFEB" stroke-width="1" stroke-dasharray="4"/>
  <line x1="530" y1="60" x2="530" y2="250" stroke="#F0EFEB" stroke-width="1" stroke-dasharray="4"/>

  <!-- X-axis labels -->
  <text x="200" y="265" font-size="8" fill="#6B6B64" text-anchor="middle">0</text>
  <text x="266" y="265" font-size="8" fill="#6B6B64" text-anchor="middle">1</text>
  <text x="332" y="265" font-size="8" fill="#6B6B64" text-anchor="middle">2</text>
  <text x="398" y="265" font-size="8" fill="#6B6B64" text-anchor="middle">3</text>
  <text x="464" y="265" font-size="8" fill="#6B6B64" text-anchor="middle">4</text>
  <text x="530" y="265" font-size="8" fill="#6B6B64" text-anchor="middle">5</text>

  <!-- Row height: 30px each, 6 dimensions -->

  <!-- SLOs & error budgets: 0 → 3, target 3 -->
  <text x="190" y="80" font-size="9" fill="#3A3A35" text-anchor="end">SLOs &amp; error budgets</text>
  <rect x="200" y="68" width="0" height="18" fill="#B0AFA8" rx="2" opacity="0.3"/>
  <rect x="200" y="68" width="198" height="18" fill="#1B6B4A" rx="3"/>
  <line x1="398" y1="65" x2="398" y2="89" stroke="#3A3A35" stroke-width="1.5" stroke-dasharray="3"/>
  <text x="402" y="80" font-size="7" fill="#3A3A35">target</text>

  <!-- Incident response: 0 → 3, target 4 -->
  <text x="190" y="112" font-size="9" fill="#3A3A35" text-anchor="end">Incident response</text>
  <rect x="200" y="100" width="198" height="18" fill="#1B6B4A" rx="3"/>
  <line x1="464" y1="97" x2="464" y2="121" stroke="#3A3A35" stroke-width="1.5" stroke-dasharray="3"/>

  <!-- Runbooks & docs: 0 → 2, target 3 -->
  <text x="190" y="144" font-size="9" fill="#3A3A35" text-anchor="end">Runbooks &amp; docs</text>
  <rect x="200" y="132" width="132" height="18" fill="#D4A017" rx="3"/>
  <line x1="398" y1="129" x2="398" y2="153" stroke="#3A3A35" stroke-width="1.5" stroke-dasharray="3"/>

  <!-- On-call: 0 → 3, target 3 -->
  <text x="190" y="176" font-size="9" fill="#3A3A35" text-anchor="end">On-call</text>
  <rect x="200" y="164" width="198" height="18" fill="#1B6B4A" rx="3"/>
  <line x1="398" y1="161" x2="398" y2="185" stroke="#3A3A35" stroke-width="1.5" stroke-dasharray="3"/>

  <!-- Chaos engineering: 0 → 1, target 2 -->
  <text x="190" y="208" font-size="9" fill="#3A3A35" text-anchor="end">Chaos engineering</text>
  <rect x="200" y="196" width="66" height="18" fill="#C0392B" rx="3"/>
  <line x1="332" y1="193" x2="332" y2="217" stroke="#3A3A35" stroke-width="1.5" stroke-dasharray="3"/>

  <!-- Load testing: 1 → 3, target 3 -->
  <text x="190" y="240" font-size="9" fill="#3A3A35" text-anchor="end">Load testing</text>
  <rect x="200" y="228" width="198" height="18" fill="#1B6B4A" rx="3"/>
  <line x1="398" y1="225" x2="398" y2="249" stroke="#3A3A35" stroke-width="1.5" stroke-dasharray="3"/>

  <!-- Legend -->
  <rect x="200" y="272" width="8" height="4" fill="#1B6B4A" rx="1"/>
  <text x="212" y="276" font-size="7" fill="#6B6B64">On target</text>
  <rect x="270" y="272" width="8" height="4" fill="#D4A017" rx="1"/>
  <text x="282" y="276" font-size="7" fill="#6B6B64">Progress</text>
  <rect x="330" y="272" width="8" height="4" fill="#C0392B" rx="1"/>
  <text x="342" y="276" font-size="7" fill="#6B6B64">Early stage</text>
  <line x1="410" y1="274" x2="420" y2="274" stroke="#3A3A35" stroke-width="1.5" stroke-dasharray="3"/>
  <text x="424" y="276" font-size="7" fill="#6B6B64">Target</text>
</svg>
