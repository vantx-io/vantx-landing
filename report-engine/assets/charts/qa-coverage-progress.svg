<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 260" font-family="'DM Sans', sans-serif">
  <!-- Background -->
  <rect width="560" height="260" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="40" y="28" font-size="12" font-weight="700" fill="#1A1A17">Test Coverage Progress</text>
  <text x="40" y="44" font-size="9" fill="#6B6B64">Tests by layer · January → March</text>

  <!-- Grid -->
  <line x1="90" y1="60" x2="90" y2="200" stroke="#E2E1DC" stroke-width="1"/>
  <line x1="90" y1="200" x2="500" y2="200" stroke="#E2E1DC" stroke-width="1"/>

  <!-- Y-axis -->
  <text x="80" y="204" font-size="8" fill="#6B6B64" text-anchor="end">0</text>
  <text x="80" y="167" font-size="8" fill="#6B6B64" text-anchor="end">100</text>
  <text x="80" y="132" font-size="8" fill="#6B6B64" text-anchor="end">200</text>
  <text x="80" y="97" font-size="8" fill="#6B6B64" text-anchor="end">300</text>

  <!-- Grid lines -->
  <line x1="90" y1="165" x2="500" y2="165" stroke="#F0EFEB" stroke-width="1" stroke-dasharray="4"/>
  <line x1="90" y1="130" x2="500" y2="130" stroke="#F0EFEB" stroke-width="1" stroke-dasharray="4"/>
  <line x1="90" y1="95" font-size="8" x2="500" y2="95" stroke="#F0EFEB" stroke-width="1" stroke-dasharray="4"/>

  <!-- January bars (x center: 170) -->
  <text x="170" y="218" font-size="9" fill="#3A3A35" text-anchor="middle">January</text>
  <!-- Unit: ~150 tests → height = 150/300 * 140 = 70 -->
  <rect x="125" y="130" width="28" height="70" fill="#1B6B4A" rx="3"/>
  <text x="139" y="126" font-size="7" fill="#1B6B4A" text-anchor="middle">150</text>
  <!-- Integration: 0 -->
  <rect x="155" y="199" width="28" height="1" fill="#3B82B5" rx="3"/>
  <text x="169" y="196" font-size="7" fill="#3B82B5" text-anchor="middle">0</text>
  <!-- E2E: 0 -->
  <rect x="185" y="199" width="28" height="1" fill="#D4A017" rx="3"/>
  <text x="199" y="196" font-size="7" fill="#D4A017" text-anchor="middle">0</text>

  <!-- February bars (x center: 300) -->
  <text x="300" y="218" font-size="9" fill="#3A3A35" text-anchor="middle">February</text>
  <!-- Unit: ~210 → height = 210/300 * 140 = 98 -->
  <rect x="255" y="102" width="28" height="98" fill="#1B6B4A" rx="3"/>
  <text x="269" y="98" font-size="7" fill="#1B6B4A" text-anchor="middle">210</text>
  <!-- Integration: 8 → height = 8/300 * 140 = 3.7 -->
  <rect x="285" y="196" width="28" height="4" fill="#3B82B5" rx="3"/>
  <text x="299" y="192" font-size="7" fill="#3B82B5" text-anchor="middle">8</text>
  <!-- E2E: 3 → height = 3/300 * 140 = 1.4 -->
  <rect x="315" y="198" width="28" height="2" fill="#D4A017" rx="3"/>
  <text x="329" y="194" font-size="7" fill="#D4A017" text-anchor="middle">3</text>

  <!-- March bars (x center: 430) -->
  <text x="430" y="218" font-size="9" fill="#3A3A35" font-weight="700" text-anchor="middle">March</text>
  <!-- Unit: ~280 → height = 280/300 * 140 = 130.7 -->
  <rect x="385" y="69" width="28" height="131" fill="#1B6B4A" rx="3"/>
  <text x="399" y="65" font-size="7" font-weight="700" fill="#1B6B4A" text-anchor="middle">280</text>
  <!-- Integration: 18 → height = 18/300 * 140 = 8.4 -->
  <rect x="415" y="192" width="28" height="8" fill="#3B82B5" rx="3"/>
  <text x="429" y="188" font-size="7" font-weight="700" fill="#3B82B5" text-anchor="middle">18</text>
  <!-- E2E: 7 → height = 7/300 * 140 = 3.3 -->
  <rect x="445" y="197" width="28" height="3" fill="#D4A017" rx="3"/>
  <text x="459" y="193" font-size="7" font-weight="700" fill="#D4A017" text-anchor="middle">7</text>
  <!-- Contract: 4 -->
  <rect x="475" y="198" width="28" height="2" fill="#6B6B64" rx="3"/>
  <text x="489" y="194" font-size="7" font-weight="700" fill="#6B6B64" text-anchor="middle">4</text>

  <!-- Legend -->
  <rect x="140" y="240" width="8" height="8" fill="#1B6B4A" rx="1"/>
  <text x="152" y="248" font-size="7" fill="#6B6B64">Unit</text>
  <rect x="190" y="240" width="8" height="8" fill="#3B82B5" rx="1"/>
  <text x="202" y="248" font-size="7" fill="#6B6B64">Integration</text>
  <rect x="260" y="240" width="8" height="8" fill="#D4A017" rx="1"/>
  <text x="272" y="248" font-size="7" fill="#6B6B64">E2E</text>
  <rect x="300" y="240" width="8" height="8" fill="#6B6B64" rx="1"/>
  <text x="312" y="248" font-size="7" fill="#6B6B64">Contract</text>
</svg>
