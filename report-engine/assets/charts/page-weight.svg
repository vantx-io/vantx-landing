<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 240" font-family="'DM Sans', sans-serif">
  <!-- Background -->
  <rect width="560" height="240" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="40" y="28" font-size="12" font-weight="700" fill="#1A1A17">Page Weight Breakdown</text>
  <text x="40" y="44" font-size="9" fill="#6B6B64">Total transfer size by resource type (MB)</text>

  <!-- Grid -->
  <line x1="110" y1="60" x2="110" y2="190" stroke="#E2E1DC" stroke-width="1"/>
  <line x1="110" y1="190" x2="530" y2="190" stroke="#E2E1DC" stroke-width="1"/>

  <!-- Scale: 0 to 5MB, width 420px, so 1MB = 84px -->

  <!-- X-axis labels -->
  <text x="110" y="206" font-size="8" fill="#6B6B64" text-anchor="middle">0</text>
  <text x="194" y="206" font-size="8" fill="#6B6B64" text-anchor="middle">1 MB</text>
  <text x="278" y="206" font-size="8" fill="#6B6B64" text-anchor="middle">2 MB</text>
  <text x="362" y="206" font-size="8" fill="#6B6B64" text-anchor="middle">3 MB</text>
  <text x="446" y="206" font-size="8" fill="#6B6B64" text-anchor="middle">4 MB</text>
  <text x="530" y="206" font-size="8" fill="#6B6B64" text-anchor="middle">5 MB</text>

  <!-- Grid lines -->
  <line x1="194" y1="60" x2="194" y2="190" stroke="#F0EFEB" stroke-width="1" stroke-dasharray="4"/>
  <line x1="278" y1="60" x2="278" y2="190" stroke="#F0EFEB" stroke-width="1" stroke-dasharray="4"/>
  <line x1="362" y1="60" x2="362" y2="190" stroke="#F0EFEB" stroke-width="1" stroke-dasharray="4"/>
  <line x1="446" y1="60" x2="446" y2="190" stroke="#F0EFEB" stroke-width="1" stroke-dasharray="4"/>

  <!-- Homepage: 3.2MB total — CSS 95KB, JS 1.1MB, Images 1.8MB, Fonts 120KB, Other 80KB -->
  <text x="100" y="79" font-size="9" fill="#3A3A35" text-anchor="end">Homepage</text>
  <!-- CSS: 95KB = 1.6px -->
  <rect x="110" y="66" width="2" height="22" fill="#3B82B5"/>
  <!-- JS: 1.1MB = 92.4px -->
  <rect x="112" y="66" width="92" height="22" fill="#D4A017"/>
  <!-- Images: 1.8MB = 151.2px -->
  <rect x="204" y="66" width="151" height="22" fill="#C0392B"/>
  <!-- Fonts: 120KB = 10px -->
  <rect x="355" y="66" width="10" height="22" fill="#6B6B64"/>
  <!-- Other -->
  <rect x="365" y="66" width="7" height="22" fill="#B0AFA8"/>
  <text x="378" y="81" font-size="8" font-weight="700" fill="#3A3A35">3.2 MB</text>

  <!-- Checkout: 4.8MB — CSS 110KB, JS 1.2MB, Images 3.3MB, Fonts 120KB, Other 70KB -->
  <text x="100" y="115" font-size="9" fill="#3A3A35" text-anchor="end">Checkout</text>
  <rect x="110" y="102" width="2" height="22" fill="#3B82B5"/>
  <rect x="112" y="102" width="101" height="22" fill="#D4A017"/>
  <rect x="213" y="102" width="277" height="22" fill="#C0392B"/>
  <rect x="490" y="102" width="10" height="22" fill="#6B6B64"/>
  <rect x="500" y="102" width="6" height="22" fill="#B0AFA8"/>
  <text x="512" y="117" font-size="8" font-weight="700" fill="#C0392B">4.8 MB</text>

  <!-- Dashboard: 3.8MB — CSS 88KB, JS 2.4MB, Images 1.1MB, Fonts 120KB, Other 72KB -->
  <text x="100" y="151" font-size="9" fill="#3A3A35" text-anchor="end">Dashboard</text>
  <rect x="110" y="138" width="2" height="22" fill="#3B82B5"/>
  <rect x="112" y="138" width="202" height="22" fill="#D4A017"/>
  <rect x="314" y="138" width="92" height="22" fill="#C0392B"/>
  <rect x="406" y="138" width="10" height="22" fill="#6B6B64"/>
  <rect x="416" y="138" width="6" height="22" fill="#B0AFA8"/>
  <text x="428" y="153" font-size="8" font-weight="700" fill="#3A3A35">3.8 MB</text>

  <!-- API Docs: 0.98MB — CSS 32KB, JS 420KB, Images 360KB, Fonts 120KB, Other 48KB -->
  <text x="100" y="187" font-size="9" fill="#3A3A35" text-anchor="end">API Docs</text>
  <rect x="110" y="174" width="3" height="22" fill="#3B82B5"/>
  <rect x="113" y="174" width="35" height="22" fill="#D4A017"/>
  <rect x="148" y="174" width="30" height="22" fill="#C0392B"/>
  <rect x="178" y="174" width="10" height="22" fill="#6B6B64"/>
  <rect x="188" y="174" width="4" height="22" fill="#B0AFA8"/>
  <text x="198" y="189" font-size="8" font-weight="700" fill="#1B6B4A">0.98 MB</text>

  <!-- Legend -->
  <rect x="140" y="220" width="8" height="8" fill="#3B82B5" rx="1"/>
  <text x="152" y="228" font-size="7" fill="#6B6B64">CSS</text>
  <rect x="180" y="220" width="8" height="8" fill="#D4A017" rx="1"/>
  <text x="192" y="228" font-size="7" fill="#6B6B64">JavaScript</text>
  <rect x="250" y="220" width="8" height="8" fill="#C0392B" rx="1"/>
  <text x="262" y="228" font-size="7" fill="#6B6B64">Images</text>
  <rect x="310" y="220" width="8" height="8" fill="#6B6B64" rx="1"/>
  <text x="322" y="228" font-size="7" fill="#6B6B64">Fonts</text>
  <rect x="360" y="220" width="8" height="8" fill="#B0AFA8" rx="1"/>
  <text x="372" y="228" font-size="7" fill="#6B6B64">Other</text>
</svg>
