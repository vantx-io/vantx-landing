<!-- Shared navigation partial — injected by js/partials.js into [data-partial="nav"] -->
<nav class="nav" aria-label="Main navigation">
  <div class="container nav__inner">

    <!-- Logo -->
    <a href="/" class="nav__logo" data-i18n-aria="nav.logo_aria">
      <picture>
        <source srcset="{{BASE}}/img/vantx-logo-horizontal-white.webp" type="image/webp">
        <img src="{{BASE}}/img/vantx-logo-horizontal-white-sm.png" alt="Vantx" class="nav__logo-img" width="140" height="32"
             onerror="this.style.display='none';this.parentElement.insertAdjacentHTML('afterend','<span class=nav__logo-mark>Vantx</span>')">
      </picture>
    </a>

    <!-- Desktop links -->
    <ul class="nav__links" role="list">
      <li>
        <a href="/#services" class="nav__link" data-i18n="nav.services">Services</a>
      </li>
      <li>
        <a href="/about/mission.html" class="nav__link" data-i18n="nav.about">About</a>
      </li>
    </ul>

    <!-- Desktop actions -->
    <div class="nav__actions">
      <button
        class="nav__lang"
        data-lang-toggle
        type="button"
        aria-label="Switch language"
      >ES</button>
      <button
        type="button"
        class="btn btn--primary btn--sm js-calendly-trigger"
        data-i18n="nav.cta"
      >Book a Call</button>
    </div>

    <!-- Mobile hamburger -->
    <button
      class="nav__mobile-toggle"
      type="button"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="nav-drawer"
    >
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </button>

  </div><!-- /.nav__inner -->

  <!-- Mobile drawer -->
  <div id="nav-drawer" class="nav__drawer" role="dialog" aria-label="Mobile navigation" aria-modal="true">
    <a href="/#services" class="nav__link" data-i18n="nav.services">Services</a>

    <div class="nav__drawer-actions">
      <button
        class="nav__lang"
        data-lang-toggle
        type="button"
        aria-label="Switch language"
      >ES</button>
      <button
        type="button"
        class="btn btn--primary btn--sm js-calendly-trigger"
        data-i18n="nav.cta"
      >Book a Call</button>
    </div>
  </div><!-- /#nav-drawer -->
