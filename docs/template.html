<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  $if(title)$<title>$title$ — Vantx</title>$endif$
  $for(header-includes)$
  $header-includes$
  $endfor$
</head>
<body>

$if(title)$
<div class="cover">
  <img class="cover__logo" src="$logo-data-uri$" alt="Vantx">
  <div class="cover__bar"></div>
  <h1 class="cover__title">$title$</h1>
  $if(subtitle)$
  <p class="cover__subtitle">$subtitle$</p>
  $endif$
  <div class="cover__meta">
    $if(version)$<span>Version $version$</span>$endif$
    $if(date)$<span>$date$</span>$endif$
    <span>vantx.io &middot; hello@vantx.io</span>
  </div>
  <div class="cover__footer">
    Confidential &mdash; Vantx
  </div>
</div>
$endif$

$body$

</body>
</html>
