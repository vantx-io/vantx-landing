version: "3.8"

# Vantix monitoring stack — run from the repo root.
# Usage:
#   docker compose up -d              # Start core stack
#   docker compose --profile otel up -d  # Include OTel Collector
#   docker compose down               # Stop all
#   docker compose logs -f            # Stream all logs

services:

  # ═══ Prometheus — Time-series storage ═══
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: vantix-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./08-k6-framework/vantix-k6/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-remote-write-receiver'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ═══ Pushgateway — k6 pushes metrics here ═══
  pushgateway:
    image: prom/pushgateway:v1.7.0
    container_name: vantix-pushgateway
    ports:
      - "9091:9091"
    restart: unless-stopped
    depends_on:
      - prometheus

  # ═══ Grafana — Dashboards ═══
  grafana:
    image: grafana/grafana:11.0.0
    container_name: vantix-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./07-plataforma/vantix-platform/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./07-plataforma/vantix-platform/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ═══ Alertmanager — Alert routing to Slack ═══
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: vantix-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./08-k6-framework/vantix-k6/docker/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped

  # ═══ OTel Collector — Optional; enable with --profile otel ═══
  otelcollector:
    profiles: ["otel"]
    image: otel/opentelemetry-collector-contrib:0.99.0
    container_name: vantix-otelcollector
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics exporter (scraped by Prometheus)
    volumes:
      - ./observability/otelcollector.yml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
